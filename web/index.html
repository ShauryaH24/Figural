<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Figural - Draw & Voice to Code</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%238B5CF6'/><path d='M25 50 L40 35 L55 50 L70 30 L85 50' stroke='white' stroke-width='6' fill='none' stroke-linecap='round'/></svg>">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="logo">
        <svg width="32" height="32" viewBox="0 0 100 100">
          <rect width="100" height="100" rx="20" fill="url(#logoGrad)"/>
          <path d="M25 50 L40 35 L55 50 L70 30 L85 50" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#374151"/>
              <stop offset="100%" style="stop-color:#111111"/>
            </linearGradient>
          </defs>
        </svg>
        <span>Figural</span>
      </div>
      
      <div class="status-indicator" id="statusIndicator">
        <span class="status-dot"></span>
        <span class="status-text">Ready</span>
      </div>

      <div class="header-actions">
        <button id="clearBtn" class="btn btn-secondary" title="Clear Canvas">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
          </svg>
        </button>
        <button id="generateBtn" class="btn btn-primary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          Generate App
        </button>
      </div>
    </header>

    <!-- Toolbar -->
    <aside id="toolbar">
      <div class="tool-group">
        <button class="tool-btn" data-tool="select" title="Select & Move (V)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
            <path d="M13 13l6 6"/>
          </svg>
        </button>
        <button class="tool-btn active" data-tool="pen" title="Pen (P)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 19l7-7 3 3-7 7-3-3z"/>
            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
            <path d="M2 2l7.586 7.586"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="line" title="Line (L)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="19" x2="19" y2="5"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="rectangle" title="Rectangle (R)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="circle" title="Circle (C)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="text" title="Text (T)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 7V4h16v3M9 20h6M12 4v16"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 20H7L3 16a1 1 0 010-1.4l9.9-9.9a1 1 0 011.4 0l5.3 5.3a1 1 0 010 1.4L11 20"/>
            <path d="M18 13l-1.4-1.4"/>
          </svg>
        </button>
        <button class="tool-btn" data-tool="image" title="Add Image (I)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </button>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
      </div>

      <div class="tool-group">
        <div class="color-picker-wrapper">
          <input type="color" id="colorPicker" value="#1f2937" title="Color">
          <span class="color-preview" id="colorPreview"></span>
        </div>
        <div class="stroke-width-wrapper">
          <input type="range" id="strokeWidth" min="1" max="20" value="3" title="Stroke Width">
          <span class="stroke-preview" id="strokePreview">3px</span>
        </div>
      </div>

      <div class="tool-group zoom-controls">
        <button id="zoomInBtn" class="tool-btn" title="Zoom In (+)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="11" y1="8" x2="11" y2="14"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </button>
        <button id="zoomOutBtn" class="tool-btn" title="Zoom Out (-)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </button>
        <button id="zoomResetBtn" class="tool-btn" title="Reset Zoom (0)">
          <span class="zoom-label" id="zoomLabel">100%</span>
        </button>
      </div>

      <div class="tool-group">
        <button id="undoBtn" class="tool-btn" title="Undo (Ctrl+Z)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 7v6h6"/>
            <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/>
          </svg>
        </button>
        <button id="redoBtn" class="tool-btn" title="Redo (Ctrl+Y)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 7v6h-6"/>
            <path d="M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Canvas Area -->
    <main id="canvasArea">
      <canvas id="drawingCanvas"></canvas>
      <div id="textInputOverlay" class="hidden">
        <textarea id="textInput" placeholder="Enter text..."></textarea>
        <div class="text-input-actions">
          <button id="textConfirm" class="btn btn-primary btn-sm">Add</button>
          <button id="textCancel" class="btn btn-secondary btn-sm">Cancel</button>
        </div>
      </div>
      <div id="dropOverlay" class="hidden">
        <div class="drop-content">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <p>Drop image here</p>
        </div>
      </div>
    </main>

    <!-- Voice & Text Controls -->
    <div id="voiceControls">
      <button id="recordBtn" class="record-btn" title="Start Recording">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
        <span>Record Voice</span>
      </button>
      
      <div class="input-divider">
        <span>or</span>
      </div>
      
      <div class="text-prompt-wrapper">
        <input 
          type="text" 
          id="textPrompt" 
          class="text-prompt-input" 
          placeholder="Describe your UI... (e.g., 'A login form with email and password')"
        >
      </div>
      
      <div id="transcriptPreview" class="hidden">
        <p id="transcriptText">Listening...</p>
      </div>
      <div id="recordingTimer" class="hidden">
        <span class="recording-dot"></span>
        <span id="timerDisplay">00:00</span>
      </div>
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Generated App</h2>
          <div class="modal-actions">
            <button id="editCodeBtn" class="btn btn-secondary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/>
              </svg>
              Edit Code
            </button>
            <button id="downloadBtn" class="btn btn-secondary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
              </svg>
              Download ZIP
            </button>
            <button id="regenerateBtn" class="btn btn-primary">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 4v6h-6M1 20v-6h6"/>
                <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
              </svg>
              Regenerate
            </button>
            <button id="closePreviewBtn" class="btn btn-icon" title="Close">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="modal-body">
          <div id="previewContainer">
            <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
          </div>
          <div id="codeEditor" class="hidden">
            <div class="code-tabs">
              <button class="code-tab active" data-file="html">index.html</button>
              <button class="code-tab" data-file="css">styles.css</button>
              <button class="code-tab" data-file="js">script.js</button>
            </div>
            <textarea id="codeTextarea" spellcheck="false"></textarea>
            <div class="code-actions">
              <button id="applyCodeBtn" class="btn btn-primary">Apply Changes</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="hidden">
      <div class="loader">
        <div class="loader-spinner"></div>
        <p>Generating your app...</p>
        <p class="loader-subtitle">Analyzing drawing and voice input</p>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
